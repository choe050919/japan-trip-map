<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#173f35">
  <title>우리들의 일본 여행 지도</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #18312b;
      --muted: #6d7e78;
      --paper: #f8f4ec;
      --surface: #fffdf8;
      --line: #e7e0d3;
      --green: #174b3e;
      --green-soft: #e4efe9;
      --orange: #f36f45;
      --orange-soft: #fff0e8;
      --yedam: #ee7252;
      --jungwoo: #4779d4;
      --jinseo: #258d73;
      --hyunseung: #d83a34;
      --durim: #8a5a3b;
      --shadow: 0 14px 40px rgba(37, 56, 49, .12);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
      overflow: hidden;
    }
    button, input, select { font: inherit; }
    button { color: inherit; }

    .app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 20px;
      color: white;
      background: var(--green);
      box-shadow: 0 4px 16px rgba(22, 48, 41, .22);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 14px;
      color: var(--green);
      background: #ffe27a;
      font-size: 21px;
      transform: rotate(-3deg);
    }
    .brand h1 { margin: 0; font-family: Georgia, "Noto Serif KR", serif; font-size: 21px; line-height: 1.1; }
    .brand p { margin: 4px 0 0; color: #c9ddd6; font-size: 12px; }
    .top-stats { display: flex; gap: 8px; }
    .top-actions { display: flex; align-items: center; gap: 9px; }
    .copy-all-button, .copy-plan-button {
      display: flex;
      height: 42px;
      align-items: center;
      gap: 7px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      color: white;
      background: rgba(255,255,255,.1);
      font-size: 11px;
      font-weight: 850;
      cursor: pointer;
      transition: .18s ease;
    }
    .copy-all-button:hover, .copy-plan-button:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
    .copy-all-button.copied, .copy-plan-button.copied { color: var(--green); border-color: #ffe27a; background: #ffe27a; }
    .copy-icon { font-size: 16px; line-height: 1; }
    .copy-caret { color: #bfd6ce; font-size: 10px; }
    .copy-menu-wrap { position: relative; }
    .copy-dropdown {
      position: absolute;
      z-index: 1300;
      top: calc(100% + 8px);
      right: 0;
      width: 270px;
      max-height: min(460px, 70vh);
      overflow-y: auto;
      padding: 7px;
      border: 1px solid rgba(24,49,43,.12);
      border-radius: 13px;
      color: var(--ink);
      background: rgba(255,253,248,.98);
      box-shadow: 0 14px 38px rgba(18,42,34,.24);
      backdrop-filter: blur(10px);
    }
    .copy-dropdown[hidden] { display: none; }
    .copy-menu-plan { padding: 7px 8px 5px; color: var(--green); font-size: 10px; font-weight: 950; }
    .copy-menu-source { display: block; margin-top: 2px; color: var(--muted); font-size: 8px; font-weight: 600; }
    .copy-menu-item { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 9px; border: 0; border-radius: 8px; color: var(--ink); background: transparent; text-align: left; font-size: 10px; font-weight: 800; cursor: pointer; }
    .copy-menu-item:hover, .copy-menu-item:focus-visible { outline: none; background: var(--green-soft); }
    .copy-menu-item span:last-child { color: var(--muted); font-size: 8px; font-weight: 700; }
    .copy-menu-separator { height: 1px; margin: 5px 7px; background: var(--line); }
    .stat {
      min-width: 76px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      text-align: center;
    }
    .stat b { display: block; font-size: 16px; }
    .stat span { color: #c9ddd6; font-size: 10px; }

    .workspace { min-height: 0; display: grid; grid-template-columns: clamp(460px, 30vw, 520px) minmax(0, 1fr); }
    .sidebar {
      z-index: 500;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      border-right: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 8px 0 26px rgba(35, 51, 45, .06);
    }
    .filters { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    body.itinerary-mode .filters { display: none; }
    body:not(.itinerary-mode) .itinerary-toolbar { display: none; }
    .search-wrap { position: relative; }
    .search-wrap span { position: absolute; top: 11px; left: 13px; font-size: 16px; }
    #search {
      width: 100%;
      height: 42px;
      padding: 0 13px 0 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      color: var(--ink);
      background: #fff;
    }
    #search:focus { border-color: #7ea99a; box-shadow: 0 0 0 3px rgba(37,141,115,.12); }
    .filter-label { margin: 14px 0 8px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .08em; }
    .people { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 7px; }
    .person-chip, .mini-filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      cursor: pointer;
      transition: .18s ease;
    }
    .person-chip { min-width: 0; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 6px; font-size: 12px; font-weight: 750; white-space: nowrap; }
    .person-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--person); }
    .person-chip.active { color: white; border-color: var(--person); background: var(--person); }
    .person-chip.active .dot { background: white; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 11px; }
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%;
      height: 38px;
      padding: 0 28px 0 11px;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      color: var(--ink);
      background: white;
      font-size: 12px;
      font-weight: 700;
    }
    .select-wrap::after { content: "⌄"; position: absolute; top: 7px; right: 11px; pointer-events: none; color: var(--muted); }
    .toggle-row { display: flex; gap: 7px; margin-top: 9px; }
    .mini-filter { flex: 1; padding: 8px 6px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .mini-filter.active { color: var(--green); border-color: #92b8a8; background: var(--green-soft); }

    .itinerary-toolbar { padding: 13px 18px 12px; border-bottom: 1px solid var(--line); background: #fbf7ef; }
    .plan-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .plan-title-row label { color: var(--green); font-size: 11px; font-weight: 900; letter-spacing: .04em; }
    .plan-select {
      min-width: 150px;
      height: 31px;
      padding: 0 26px 0 9px;
      border: 1px solid #d8d2c6;
      border-radius: 9px;
      color: var(--ink);
      background: white;
      font-size: 11px;
      font-weight: 800;
    }
    .day-tabs { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto;
      padding: 7px 10px;
      border: 1px solid #ddd6ca;
      border-radius: 9px;
      color: var(--muted);
      background: white;
      font-size: 10px;
      font-weight: 850;
      cursor: pointer;
    }
    .day-tab.active { color: white; border-color: var(--day-color, var(--green)); background: var(--day-color, var(--green)); }
    .plan-caption { margin-top: 8px; overflow: hidden; color: var(--muted); font-size: 10px; line-height: 1.4; text-overflow: ellipsis; white-space: nowrap; }

    .list-heading { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 8px; }
    .list-heading span { color: var(--muted); font-size: 11px; }
    .view-tabs { display: flex; gap: 4px; padding: 3px; border-radius: 9px; background: #eee9df; }
    .view-tab { padding: 5px 9px; border: 0; border-radius: 7px; color: var(--muted); background: transparent; font-size: 10px; font-weight: 900; cursor: pointer; }
    .view-tab.active { color: var(--green); background: white; box-shadow: 0 2px 6px rgba(24,49,43,.09); }
    .place-list { min-height: 0; overflow: auto; padding: 0 11px 22px; scrollbar-width: thin; scrollbar-color: #c9d3ce transparent; }
    .place-card {
      width: 100%;
      display: grid;
      grid-template-columns: 39px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 11px 9px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: .16s ease;
    }
    .place-card:hover, .place-card.active { border-color: var(--line); background: #fff; box-shadow: 0 7px 20px rgba(37, 56, 49, .07); transform: translateY(-1px); }
    .place-icon {
      display: grid;
      width: 39px;
      height: 39px;
      place-items: center;
      border-radius: 12px;
      background: var(--icon-bg, #edf3ef);
      font-size: 17px;
    }
    .place-main { min-width: 0; }
    .place-name-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .place-name { overflow: hidden; font-size: 13px; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
    .common-badge { flex: 0 0 auto; padding: 2px 5px; border-radius: 5px; color: #b34a2e; background: var(--orange-soft); font-size: 8px; font-weight: 900; }
    .place-meta { margin-top: 4px; overflow: hidden; color: var(--muted); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .person-tag { padding: 3px 6px; border-radius: 999px; color: white; background: var(--person); font-size: 9px; font-weight: 800; }
    .save-btn {
      display: grid;
      width: 29px;
      height: 29px;
      place-items: center;
      border: 0;
      border-radius: 9px;
      color: #9ba7a2;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
    }
    .save-btn:hover { background: #f2eee6; }
    .save-btn.saved { color: var(--orange); }
    .empty { padding: 40px 24px; color: var(--muted); text-align: center; font-size: 13px; line-height: 1.7; }

    .timeline-day { margin: 4px 5px 14px; }
    .timeline-day-head { padding: 10px 10px 9px; border-left: 4px solid var(--day-color); border-radius: 10px; background: #f7f3eb; }
    .timeline-day-head strong { display: block; font-size: 12px; line-height: 1.4; }
    .timeline-day-head span { display: block; margin-top: 3px; color: var(--muted); font-size: 9px; line-height: 1.45; }
    .timeline-card {
      position: relative;
      display: grid;
      grid-template-columns: 53px 27px 1fr;
      gap: 7px;
      min-height: 66px;
      padding: 9px 8px 8px 5px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      text-align: left;
    }
    .timeline-card.mapped { cursor: pointer; }
    .timeline-card.mapped:hover, .timeline-card.active { background: white; box-shadow: 0 6px 18px rgba(37,56,49,.08); }
    .timeline-time { padding-top: 3px; color: var(--muted); font-size: 9px; font-weight: 800; line-height: 1.35; text-align: right; }
    .timeline-rail { position: relative; display: flex; justify-content: center; }
    .timeline-rail::after { content: ""; position: absolute; top: 26px; bottom: -15px; width: 2px; background: #ddd8ce; }
    .timeline-card:last-child .timeline-rail::after { display: none; }
    .timeline-node {
      z-index: 1;
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      background: var(--day-color);
      box-shadow: 0 0 0 1px var(--day-color);
      font-size: 9px;
      font-weight: 900;
    }
    .timeline-node.secondary { color: var(--muted); border-color: #f8f4ec; background: #e8e3d9; box-shadow: 0 0 0 1px #d8d2c6; font-size: 11px; }
    .timeline-copy { min-width: 0; }
    .timeline-copy strong { display: block; overflow: hidden; font-size: 11px; line-height: 1.4; text-overflow: ellipsis; white-space: nowrap; }
    .timeline-copy p { margin: 3px 0 0; color: var(--muted); font-size: 9px; line-height: 1.45; }
    .timeline-transit { color: #4779a4 !important; }
    .timeline-tips { margin: 4px 10px 0; padding: 9px 10px; border-radius: 9px; color: #745c25; background: #fff5d9; font-size: 9px; line-height: 1.5; }

    .map-wrap { position: relative; min-width: 0; min-height: 0; background: #dfe9e3; }
    #map { position: absolute; inset: 0; }
    .map-tools { position: absolute; z-index: 450; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 8px; }
    .map-tool {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(24,49,43,.12);
      border-radius: 12px;
      background: rgba(255,253,248,.96);
      box-shadow: 0 6px 20px rgba(27,50,43,.16);
      font-size: 17px;
      cursor: pointer;
    }
    .map-tool:hover { background: white; transform: translateY(-1px); }
    .legend {
      position: absolute;
      z-index: 450;
      left: 14px;
      bottom: 22px;
      padding: 10px 12px;
      border: 1px solid rgba(24,49,43,.1);
      border-radius: 12px;
      background: rgba(255,253,248,.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      font-size: 10px;
    }
    .legend strong { display: block; margin-bottom: 7px; font-size: 10px; }
    .legend-row { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .legend-row + .legend-row { margin-top: 5px; }
    .legend-mark { width: 11px; height: 11px; border: 2px solid white; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 1px #b8c7c0; }
    .legend-mark.common { background: var(--orange); box-shadow: 0 0 0 3px rgba(243,111,69,.2); }
    .legend-route { width: 16px; border-top: 3px dashed #4779d4; }
    .legend-stay { display: grid; width: 16px; height: 16px; place-items: center; border-radius: 5px; color: white; background: #5b3f92; font-size: 9px; }

    .custom-pin { background: transparent; border: 0; }
    .pin-body {
      position: relative;
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50% 50% 50% 9px;
      color: white;
      background: var(--pin, var(--green));
      box-shadow: 0 6px 13px rgba(24,49,43,.27);
      font-size: 15px;
      transform: rotate(-45deg);
    }
    .pin-body span { transform: rotate(45deg); }
    .pin-body.common::after {
      content: "";
      position: absolute;
      inset: -6px;
      border: 2px solid var(--orange);
      border-radius: 50% 50% 50% 10px;
    }
    .route-div-icon { background: transparent; border: 0; }
    .route-pin {
      display: grid;
      width: 29px;
      height: 29px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      background: var(--route-color);
      box-shadow: 0 5px 13px rgba(24,49,43,.32);
      font-size: 11px;
      font-weight: 950;
    }
    .route-popup-time { color: var(--route-color); font-size: 10px; font-weight: 900; }
    .route-note { margin-top: 6px; padding: 7px 8px; border-radius: 8px; color: #536862; background: #f2f5f3; font-size: 9px; line-height: 1.45; }
    .leaflet-tooltip.route-distance-tooltip {
      padding: 8px 10px;
      border: 0;
      border-radius: 9px;
      color: var(--ink);
      background: rgba(255,253,248,.97);
      box-shadow: 0 7px 22px rgba(24,49,43,.2);
      font-family: inherit;
      font-size: 10px;
      line-height: 1.5;
    }
    .route-distance-tooltip b { color: var(--green); font-size: 11px; }
    .stay-div-icon { background: transparent; border: 0; }
    .stay-pin {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 3px solid white;
      border-radius: 11px 11px 11px 3px;
      color: white;
      background: #5b3f92;
      box-shadow: 0 6px 15px rgba(42,28,76,.32);
      font-size: 16px;
      transform: rotate(-4deg);
    }
    .stay-section { margin: 4px 5px 14px; padding: 10px; border: 1px solid #e4dcef; border-radius: 12px; background: #faf7ff; }
    .stay-section h3 { margin: 0 0 8px; color: #5b3f92; font-size: 11px; }
    .stay-card { display: grid; grid-template-columns: 30px 1fr auto; gap: 8px; align-items: center; padding: 8px; border: 0; border-radius: 9px; background: white; text-align: left; cursor: pointer; }
    .stay-card + .stay-card { margin-top: 6px; }
    .stay-card:hover, .stay-card.active { box-shadow: 0 5px 15px rgba(66,45,104,.12); }
    .stay-card-icon { display: grid; width: 28px; height: 28px; place-items: center; border-radius: 8px; color: white; background: #5b3f92; font-size: 13px; }
    .stay-card-copy { min-width: 0; }
    .stay-card-copy strong { display: block; overflow: hidden; font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
    .stay-card-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }
    .precision-badge { padding: 3px 5px; border-radius: 6px; color: #745c25; background: #fff0bd; font-size: 8px; font-weight: 900; }
    .precision-badge.exact { color: #21644f; background: #dff1e9; }
    .leaflet-popup-content-wrapper { border-radius: 15px; box-shadow: var(--shadow); }
    .leaflet-popup-content { width: 248px !important; margin: 15px 16px 14px; font-family: inherit; }
    .popup-kicker { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 10px; font-weight: 800; }
    .popup-title { margin: 6px 0 5px; color: var(--ink); font-size: 16px; font-weight: 900; line-height: 1.35; }
    .popup-desc { margin: 0 0 10px; color: #5f706a; font-size: 11px; line-height: 1.55; }
    .popup-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
    .popup-tags .person-tag { font-size: 10px; }
    .popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .popup-actions a {
      padding: 8px 6px;
      border-radius: 9px;
      color: white;
      background: var(--green);
      text-align: center;
      text-decoration: none;
      font-size: 10px;
      font-weight: 850;
    }
    .popup-actions a:last-child { color: var(--green); background: var(--green-soft); }
    .leaflet-control-attribution { font-size: 8px; }

    @media (max-width: 800px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; }
      .topbar { position: sticky; top: 0; padding: 11px 13px; }
      .brand-mark { width: 37px; height: 37px; border-radius: 12px; }
      .brand h1 { font-size: 17px; }
      .brand p { display: none; }
      .stat { min-width: 58px; padding: 6px 7px; }
      .stat:nth-child(2) { display: none; }
      .top-actions { gap: 6px; }
      .top-stats { display: none; }
      .copy-all-button, .copy-plan-button { width: 55px; padding: 0; justify-content: center; }
      .copy-label { display: none; }
      .copy-all-button::after { content: "복사"; font-size: 10px; }
      .copy-all-button.copied::after { content: "완료"; }
      .copy-plan-button::after { content: "일정"; font-size: 10px; }
      .copy-plan-button.copied::after { content: "완료"; }
      .copy-icon { font-size: 14px; }
      .copy-caret { display: none; }
      .copy-dropdown { position: fixed; top: 67px; right: 10px; width: min(300px, calc(100vw - 20px)); max-height: 62vh; }
      .workspace { display: flex; flex-direction: column; }
      .map-wrap { order: 1; height: 53vh; min-height: 390px; }
      .sidebar { order: 2; min-height: 640px; border: 0; box-shadow: none; }
      .legend { bottom: 12px; }
      .place-list { max-height: 620px; overflow: visible; }
      .filters { padding-top: 14px; }
      .people { grid-template-columns: repeat(auto-fit, minmax(62px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">旅</div>
        <div>
          <h1>우리들의 일본 여행 지도</h1>
          <p>예담 · 정우 · 진서 · 현승 · 두림의 가고 싶은 곳을 한 장에</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="copy-all-button" id="copyAllButton" type="button" title="46곳의 모든 정보를 복사">
          <span class="copy-icon" aria-hidden="true">⧉</span><span class="copy-label">전체 정보 복사</span>
        </button>
        <div class="copy-menu-wrap" id="copyMenuWrap">
          <button class="copy-plan-button" id="copyPlanButton" type="button" aria-haspopup="menu" aria-expanded="false" title="계획별 또는 날짜별 일정 복사">
            <span class="copy-icon" aria-hidden="true">☷</span><span class="copy-label">일정 복사</span><span class="copy-caret" aria-hidden="true">⌄</span>
          </button>
          <div class="copy-dropdown" id="copyDropdown" role="menu" hidden></div>
        </div>
        <div class="top-stats" aria-label="여행지 요약">

          <div class="stat"><b id="savedCount">0</b><span>일정에 담음</span></div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="filters" aria-label="여행지 필터">
          <div class="search-wrap">
            <span aria-hidden="true">⌕</span>

          <div class="filter-label">누구의 픽?</div>

            <button class="person-chip active" type="button" data-person="예담" style="--person: var(--yedam)"><span class="dot"></span>예담 <span>24</span></button>
            <button class="person-chip active" type="button" data-person="정우" style="--person: var(--jungwoo)"><span class="dot"></span>정우 <span>16</span></button>
            <button class="person-chip active" type="button" data-person="진서" style="--person: var(--jinseo)"><span class="dot"></span>진서 <span>13</span></button>
            <button class="person-chip active" type="button" data-person="현승" style="--person: var(--hyunseung)"><span class="dot"></span>현승 <span>0</span></button>
            <button class="person-chip active" type="button" data-person="두림" style="--person: var(--durim)"><span class="dot"></span>두림 <span>0</span></button>

                <option value="구마모토">구마모토</option>
                <option value="나가사키">나가사키</option>
              </select>
            </label>
            <label class="select-wrap">
              <select id="categoryFilter" aria-label="장소 종류 선택">
                <option value="all">모든 종류</option>
                <option value="볼거리">⛩ 볼거리</option>
                <option value="산책">🌿 산책</option>
                <option value="쇼핑">🛍 쇼핑</option>
                <option value="맛집">🍜 맛집</option>
                <option value="카페">☕ 카페·빵</option>
                <option value="체험">♨ 체험·온천</option>
              </select>

          <div class="toggle-row">
            <button class="mini-filter" id="commonOnly" type="button">🔥 겹치는 픽만</button>
            <button class="mini-filter" id="savedOnly" type="button">★ 일정에 담은 곳</button>
          </div>

        <section class="itinerary-toolbar" aria-label="여행 계획 선택">
          <div class="plan-title-row">
            <label for="planSelect">🧭 동선 계획</label>
            <select class="plan-select" id="planSelect" aria-label="계획 선택"></select>
          </div>
          <div class="day-tabs" id="dayTabs"></div>
          <div class="plan-caption" id="planCaption"></div>
        </section>

        <div class="list-heading">
          <div class="view-tabs" aria-label="목록 보기 방식">
            <button class="view-tab" type="button" data-view="candidates">후보지</button>
            <button class="view-tab active" type="button" data-view="itinerary">일정</button>
          </div>
          <span id="resultSummary">43곳 · 겹치는 픽 우선</span>
        </div>
        <div class="place-list" id="placeList"></div>
      </aside>

      <section class="map-wrap" aria-label="여행 지도">
        <div id="map"></div>
        <div class="map-tools">
          <button class="map-tool" id="fitButton" type="button" title="보이는 핀 전체 보기" aria-label="보이는 핀 전체 보기">⌗</button>
          <button class="map-tool" id="locateButton" type="button" title="내 위치" aria-label="내 위치">◎</button>
        </div>
        <div class="legend">
          <strong>핀 안내</strong>
          <div class="legend-row"><span class="legend-route"></span>날짜별 방문 순서</div>
          <div class="legend-row"><span class="legend-stay">⌂</span>숙소</div>
          <div class="legend-row"><span class="legend-mark common"></span>2명 이상 겹치는 픽</div>
          <div class="legend-row"><span class="legend-mark"></span>한 사람의 픽</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./data/places.js"></script>
  <script src="./data/itineraries.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const PEOPLE = {
      "예담": { color: "#ee7252" },
      "정우": { color: "#4779d4" },
      "진서": { color: "#258d73" },
      "현승": { color: "#d83a34" },
      "두림": { color: "#8a5a3b" }
    };

    const CATEGORIES = {
      "볼거리": { icon: "⛩", color: "#a95e42", bg: "#f8e9e2" },
      "산책": { icon: "🌿", color: "#347c60", bg: "#e7f2eb" },
      "쇼핑": { icon: "🛍", color: "#6b67b5", bg: "#eeebfa" },
      "맛집": { icon: "🍜", color: "#d66a3f", bg: "#fff0e7" },
      "카페": { icon: "☕", color: "#9a7042", bg: "#f7ede0" },
      "체험": { icon: "♨", color: "#3f7da0", bg: "#e5f1f7" }
    };

    const PLACES = window.TRIP_PLACES?.places || [];

    const ITINERARIES = window.TRIP_ITINERARIES?.plans || [];

    const state = {
      people: new Set(Object.keys(PEOPLE)),
      city: "all",
      category: "all",
      query: "",
      commonOnly: false,
      savedOnly: false,
      view: ITINERARIES.length ? "itinerary" : "candidates",
      planId: ITINERARIES[0]?.id || null,
      dayId: "all",
      saved: new Set(JSON.parse(localStorage.getItem("japan-trip-saved") || "[]"))
    };

    const map = L.map("map", { zoomControl: false, minZoom: 5 }).setView([33.5902, 130.4017], 13);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 20,
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const routeLayer = L.layerGroup().addTo(map);
    const markers = new Map();
    const routeMarkers = new Map();
    const stayMarkers = new Map();
    let locationMarker = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;" })[char]);
    }

    function personTags(people) {
      return people.map(person => `<span class="person-tag" style="--person:${PEOPLE[person].color}">${person}</span>`).join("");
    }

    function searchUrl(place) {
      if (place.mapUrl) return place.mapUrl;
      const query = encodeURIComponent(`${place.name} ${place.city} 일본`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function routeUrl(place) {
      return `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}`;
    }

    function selectedPlan() {
      return ITINERARIES.find(plan => plan.id === state.planId) || ITINERARIES[0] || null;
    }

    function selectedDays() {
      const plan = selectedPlan();
      if (!plan) return [];
      return state.dayId === "all" ? plan.days : plan.days.filter(day => day.id === state.dayId);
    }

    function accommodationsForDate(plan, date) {
      const stays = plan?.accommodations || [];
      if (!date) return [];
      return stays.filter(stay => stay.checkIn <= date && date < stay.checkOut);
    }

    function visibleAccommodations() {
      const plan = selectedPlan();
      const stays = plan?.accommodations || [];
      if (state.dayId === "all") return stays;
      return accommodationsForDate(plan, selectedDays()[0]?.date);
    }

    function resolveItineraryItem(item) {
      const place = item.placeName ? PLACES.find(candidate => candidate.name === item.placeName) : null;
      return {
        ...item,
        place,
        lat: item.lat ?? place?.lat ?? null,
        lng: item.lng ?? place?.lng ?? null
      };
    }

    function formatPlanDate(date) {
      return new Intl.DateTimeFormat("ko-KR", { month: "numeric", day: "numeric", weekday: "short" }).format(new Date(`${date}T12:00:00`));
    }

    function allPlacesText() {
      const lines = ["우리들의 일본 여행 지도", `총 ${PLACES.length}곳`, ""];
      [...new Set(PLACES.map(place => place.city))].forEach(city => {
        lines.push(`■ ${city}`);
        PLACES.filter(place => place.city === city).forEach((place, index) => {
          lines.push(`${index + 1}. ${place.name}`);
          lines.push(`   지역: ${place.area}`);
          lines.push(`   종류: ${place.category}`);
          lines.push(`   태그: ${place.people.join(", ")}`);
          lines.push(`   메모: ${place.note}`);
          lines.push(`   지도: ${searchUrl(place)}`);
          lines.push("");
        });
      });
      ITINERARIES.forEach(plan => {
        lines.push("", `■ 일정 계획 · ${plan.name}`, `${plan.startDate} ~ ${plan.endDate}`, plan.description, "");
        (plan.accommodations || []).forEach(stay => {
          lines.push(`- 숙소 ${stay.checkIn}~${stay.checkOut} | ${stay.name}`);
          lines.push(`  ${stay.officialName}`);
          lines.push(`  위치: ${stay.area}${stay.precision === "approximate" ? " (공개 근사 위치)" : ""}`);
          lines.push(`  예약: ${stay.bookingUrl}`, "");
        });
        plan.days.forEach(day => {
          lines.push(`[${day.dayNumber}일차 · ${day.date}] ${day.title}`);
          day.items.forEach(item => {
            const time = item.start ? `${item.start}${item.end ? `~${item.end}` : ""}` : "시간 미정";
            lines.push(`- ${time} | ${item.title}`);
            if (item.details) lines.push(`  ${item.details}`);
            if (item.transit) lines.push(`  이동: ${item.transit}`);
          });
          lines.push("");
        });
      });
      return lines.join("\n").trim();
    }

    function itineraryCopyText(plan, dayId = "all") {
      const days = dayId === "all" ? plan.days : plan.days.filter(day => day.id === dayId);
      const stays = dayId === "all"
        ? (plan.accommodations || [])
        : accommodationsForDate(plan, days[0]?.date);
      const lines = [
        `여행 일정 · ${plan.name}`,
        `${plan.startDate} ~ ${plan.endDate}`,
        plan.description,
        ""
      ];

      if (stays.length) {
        lines.push("■ 숙소");
        stays.forEach(stay => {
          lines.push(`- ${stay.checkIn}~${stay.checkOut} | ${stay.name}`);
          lines.push(`  ${stay.officialName}`);
          lines.push(`  위치: ${stay.area}${stay.precision === "approximate" ? " (공개 근사 위치)" : ""}`);
          lines.push(`  예약: ${stay.bookingUrl}`);
        });
        lines.push("");
      }

      days.forEach(day => {
        lines.push(`■ ${day.dayNumber}일차 · ${day.date} · ${day.title}`);
        lines.push(day.summary, "");
        day.items.forEach(item => {
          const time = item.start ? `${item.start}${item.end ? `~${item.end}` : ""}` : "시간 미정";
          const resolved = resolveItineraryItem(item);
          lines.push(`- ${time} | ${item.title}`);
          if (item.details) lines.push(`  ${item.details}`);
          if (item.transit) lines.push(`  이동: ${item.transit}`);
          if (Number.isFinite(resolved.lat) && Number.isFinite(resolved.lng)) {
            const mapHref = resolved.place
              ? searchUrl(resolved.place)
              : `https://www.google.com/maps/search/?api=1&query=${resolved.lat},${resolved.lng}`;
            lines.push(`  지도: ${mapHref}`);
          }
        });
        if (day.tips?.length) {
          lines.push("", "팁");
          day.tips.forEach(tip => lines.push(`- ${tip}`));
        }
        lines.push("");
      });
      return lines.join("\n").trim();
    }

    function renderCopyMenu() {
      const dropdown = document.getElementById("copyDropdown");
      if (!ITINERARIES.length) {
        dropdown.innerHTML = `<div class="copy-menu-plan">등록된 일정이 없습니다.</div>`;
        return;
      }
      dropdown.innerHTML = ITINERARIES.map((plan, planIndex) => `
        <div class="copy-menu-plan">${escapeHtml(plan.name)}<span class="copy-menu-source">${escapeHtml(plan.source || `${plan.startDate} ~ ${plan.endDate}`)}</span></div>
        <button class="copy-menu-item" type="button" role="menuitem" data-copy-plan="${escapeHtml(plan.id)}" data-copy-day="all"><span>전체 일정</span><span>${plan.days.length}일 · 숙소 ${(plan.accommodations || []).length}</span></button>
        ${plan.days.map(day => `<button class="copy-menu-item" type="button" role="menuitem" data-copy-plan="${escapeHtml(plan.id)}" data-copy-day="${escapeHtml(day.id)}"><span>${day.dayNumber}일차 · ${escapeHtml(formatPlanDate(day.date))}</span><span>${day.items.length}개 항목</span></button>`).join("")}
        ${planIndex < ITINERARIES.length - 1 ? '<div class="copy-menu-separator"></div>' : ""}
      `).join("");
      dropdown.querySelectorAll("[data-copy-plan]").forEach(button => {
        button.addEventListener("click", () => copyPlanSelection(button.dataset.copyPlan, button.dataset.copyDay));
      });
    }

    function setCopyMenuOpen(open) {
      const button = document.getElementById("copyPlanButton");
      document.getElementById("copyDropdown").hidden = !open;
      button.setAttribute("aria-expanded", String(open));
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      const copied = document.execCommand("copy");
      textarea.remove();
      if (!copied) throw new Error("copy failed");
    }

    async function writeClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
      else fallbackCopy(text);
    }

    function showCopyFeedback(button, successText, originalText) {
      const label = button.querySelector(".copy-label");
      button.classList.add("copied");
      label.textContent = successText;
      window.setTimeout(() => {
        button.classList.remove("copied");
        label.textContent = originalText;
      }, 1800);
    }

    async function copyAllPlaces() {
      const button = document.getElementById("copyAllButton");
      try {
        await writeClipboard(allPlacesText());
        showCopyFeedback(button, "전체 복사 완료", "전체 정보 복사");
      } catch (error) {
        alert("복사하지 못했습니다. 브라우저의 클립보드 권한을 확인해주세요.");
      }
    }

    async function copyPlanSelection(planId, dayId) {
      const plan = ITINERARIES.find(item => item.id === planId);
      if (!plan) return;
      const button = document.getElementById("copyPlanButton");
      try {
        await writeClipboard(itineraryCopyText(plan, dayId));
        setCopyMenuOpen(false);
        showCopyFeedback(button, "일정 복사 완료", "일정 복사");
      } catch (error) {
        alert("일정을 복사하지 못했습니다. 브라우저의 클립보드 권한을 확인해주세요.");
      }
    }

    function popupHtml(place) {
      const category = CATEGORIES[place.category];
      const common = place.people.length > 1 ? ` · ${place.people.length === 3 ? "모두의 픽" : "겹치는 픽"}` : "";
      return `
        <div class="popup-kicker">${category.icon} ${escapeHtml(place.category)} · ${escapeHtml(place.area)}${common}</div>
        <div class="popup-title">${escapeHtml(place.name)}</div>
        <p class="popup-desc">${escapeHtml(place.note)}</p>
        <div class="popup-tags">${personTags(place.people)}</div>
        <div class="popup-actions">
          <a href="${searchUrl(place)}" target="_blank" rel="noopener">Google 지도</a>
          <a href="${routeUrl(place)}" target="_blank" rel="noopener">길찾기 ↗</a>
        </div>`;
    }

    function markerIcon(place) {
      const category = CATEGORIES[place.category];
      return L.divIcon({
        className: "custom-pin",
        html: `<div class="pin-body ${place.people.length > 1 ? "common" : ""}" style="--pin:${category.color}"><span>${category.icon}</span></div>`,
        iconSize: [38, 42],
        iconAnchor: [19, 39],
        popupAnchor: [0, -35]
      });
    }

    PLACES.forEach(place => {
      const marker = L.marker([place.lat, place.lng], { icon: markerIcon(place), title: place.name }).bindPopup(popupHtml(place));
      marker.on("click", () => setActiveCard(place.name));
      markers.set(place.name, marker);
    });

    function itineraryPopup(item, day, routeNumber) {
      const resolved = resolveItineraryItem(item);
      const tags = resolved.place ? `<div class="popup-tags">${personTags(resolved.place.people)}</div>` : "";
      const mapHref = resolved.place
        ? searchUrl(resolved.place)
        : `https://www.google.com/maps/search/?api=1&query=${resolved.lat},${resolved.lng}`;
      return `
        <div class="route-popup-time" style="--route-color:${day.color}">${escapeHtml(item.start || "시간 미정")}${item.end ? `–${escapeHtml(item.end)}` : ""} · ${day.dayNumber}일차 #${routeNumber}</div>
        <div class="popup-title">${escapeHtml(item.title)}</div>
        <p class="popup-desc">${escapeHtml(item.details || "")}</p>
        ${item.transit ? `<div class="route-note">이동 · ${escapeHtml(item.transit)}</div>` : ""}
        ${tags}
        <div class="popup-actions"><a href="${mapHref}" target="_blank" rel="noopener">Google 지도</a><a href="https://www.google.com/maps/dir/?api=1&destination=${resolved.lat},${resolved.lng}" target="_blank" rel="noopener">길찾기 ↗</a></div>`;
    }

    function renderPlanControls() {
      const select = document.getElementById("planSelect");
      const plan = selectedPlan();
      select.innerHTML = ITINERARIES.length
        ? ITINERARIES.map(item => `<option value="${escapeHtml(item.id)}" ${item.id === plan?.id ? "selected" : ""}>${escapeHtml(item.name)}</option>`).join("")
        : `<option>등록된 계획 없음</option>`;
      select.disabled = !ITINERARIES.length;

      const tabs = document.getElementById("dayTabs");
      if (!plan) {
        tabs.innerHTML = "";
        document.getElementById("planCaption").textContent = "data/itineraries.js에 계획을 추가할 수 있습니다.";
        return;
      }
      tabs.innerHTML = [
        `<button class="day-tab ${state.dayId === "all" ? "active" : ""}" type="button" data-day="all" style="--day-color:var(--green)">전체 동선</button>`,
        ...plan.days.map(day => `<button class="day-tab ${state.dayId === day.id ? "active" : ""}" type="button" data-day="${escapeHtml(day.id)}" style="--day-color:${day.color}">${day.dayNumber}일차 · ${escapeHtml(formatPlanDate(day.date))}</button>`)
      ].join("");
      document.getElementById("planCaption").textContent = `${plan.startDate} ~ ${plan.endDate} · ${plan.description}`;
      document.querySelectorAll("[data-day]").forEach(button => {
        button.addEventListener("click", () => {
          state.dayId = button.dataset.day;
          renderPlanControls();
          renderRoutes({ fit: true });
          updateView();
        });
      });
    }

    function accommodationPopup(stay) {
      const approximate = stay.precision === "approximate";
      const mapHref = stay.mapUrl || `https://www.google.com/maps/search/?api=1&query=${stay.lat},${stay.lng}`;
      return `
        <div class="route-popup-time" style="--route-color:#5b3f92">숙소 · ${escapeHtml(stay.checkIn)} → ${escapeHtml(stay.checkOut)}</div>
        <div class="popup-title">${escapeHtml(stay.name)}</div>
        <p class="popup-desc">${escapeHtml(stay.officialName)}<br>${escapeHtml(stay.area)}</p>
        <div class="route-note">${approximate ? "Airbnb가 예약 전 공개한 근사 위치입니다. 정확한 주소는 예약 정보를 확인하세요." : "숙소 공식 주소로 확인한 위치입니다."}</div>
        <div class="popup-actions"><a href="${stay.bookingUrl}" target="_blank" rel="noopener">예약 페이지</a><a href="${mapHref}" target="_blank" rel="noopener">지도 보기 ↗</a></div>`;
    }

    function accommodationHtml(stays) {
      if (!stays.length) return "";
      return `
        <section class="stay-section">
          <h3>⌂ ${state.dayId === "all" ? `전체 숙소 ${stays.length}곳` : "이날의 숙소"}</h3>
          ${stays.map(stay => `
            <div class="stay-card" role="button" tabindex="0" data-stay-id="${escapeHtml(stay.id)}">
              <span class="stay-card-icon">🛏</span>
              <span class="stay-card-copy"><strong>${escapeHtml(stay.name)}</strong><span>${escapeHtml(stay.checkIn)} → ${escapeHtml(stay.checkOut)} · ${escapeHtml(stay.area)}</span></span>
              <span class="precision-badge ${stay.precision === "exact" ? "exact" : ""}">${stay.precision === "exact" ? "정확" : "근사"}</span>
            </div>`).join("")}
        </section>`;
    }

    function setActiveStay(stayId) {
      document.querySelectorAll("[data-stay-id]").forEach(card => card.classList.toggle("active", card.dataset.stayId === stayId));
    }

    function openStay(stayId) {
      const marker = stayMarkers.get(stayId);
      if (!marker) return;
      map.flyTo(marker.getLatLng(), Math.max(map.getZoom(), 15), { duration: .8 });
      window.setTimeout(() => marker.openPopup(), 500);
      setActiveStay(stayId);
    }

    function formatStraightDistance(meters) {
      if (meters < 1000) return `${Math.round(meters / 10) * 10} m`;
      return `${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)} km`;
    }

    function renderRoutes({ fit = false } = {}) {
      routeLayer.clearLayers();
      routeMarkers.clear();
      stayMarkers.clear();
      const allCoordinates = [];

      selectedDays().forEach(day => {
        const dayStops = [];
        let routeNumber = 0;
        day.items.forEach(item => {
          const resolved = resolveItineraryItem(item);
          if (!Number.isFinite(resolved.lat) || !Number.isFinite(resolved.lng)) return;
          routeNumber += 1;
          const latlng = [resolved.lat, resolved.lng];
          dayStops.push({ latlng, number: routeNumber, title: item.title });
          allCoordinates.push(latlng);
          const icon = L.divIcon({
            className: "route-div-icon",
            html: `<div class="route-pin" style="--route-color:${day.color}">${routeNumber}</div>`,
            iconSize: [31, 31],
            iconAnchor: [15, 15],
            popupAnchor: [0, -13]
          });
          const marker = L.marker(latlng, { icon, title: `${routeNumber}. ${item.title}`, zIndexOffset: 1200 })
            .bindPopup(itineraryPopup(item, day, routeNumber));
          marker.on("click", () => setActiveTimeline(item.id));
          routeLayer.addLayer(marker);
          routeMarkers.set(item.id, marker);
        });

        for (let index = 1; index < dayStops.length; index += 1) {
          const from = dayStops[index - 1];
          const to = dayStops[index];
          const distance = map.distance(from.latlng, to.latlng);
          const visibleSegment = L.polyline([from.latlng, to.latlng], {
            color: day.color,
            weight: 4,
            opacity: .82,
            dashArray: "9 9",
            lineCap: "round",
            lineJoin: "round",
            interactive: false
          });
          const hitSegment = L.polyline([from.latlng, to.latlng], {
            color: day.color,
            weight: 18,
            opacity: .001,
            lineCap: "round"
          }).bindTooltip(
            `<strong>${from.number} → ${to.number}</strong><br>${escapeHtml(from.title)} → ${escapeHtml(to.title)}<br><b>직선거리 ${formatStraightDistance(distance)}</b>`,
            { sticky: true, direction: "top", className: "route-distance-tooltip", opacity: 1 }
          );
          hitSegment.on("mouseover", () => visibleSegment.setStyle({ weight: 7, opacity: 1 }));
          hitSegment.on("mouseout", () => visibleSegment.setStyle({ weight: 4, opacity: .82 }));
          routeLayer.addLayer(visibleSegment);
          routeLayer.addLayer(hitSegment);
        }
      });

      visibleAccommodations().forEach(stay => {
        const latlng = [stay.lat, stay.lng];
        allCoordinates.push(latlng);
        const icon = L.divIcon({
          className: "stay-div-icon",
          html: `<div class="stay-pin">🛏</div>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -15]
        });
        const marker = L.marker(latlng, { icon, title: `숙소 · ${stay.name}`, zIndexOffset: 1400 })
          .bindPopup(accommodationPopup(stay));
        marker.on("click", () => setActiveStay(stay.id));
        routeLayer.addLayer(marker);
        stayMarkers.set(stay.id, marker);
      });

      if (fit && allCoordinates.length) {
        if (allCoordinates.length === 1) map.flyTo(allCoordinates[0], 15, { duration: .8 });
        else map.fitBounds(L.latLngBounds(allCoordinates), { padding: [55, 55], maxZoom: 14 });
      }
    }

    function itineraryHtml() {
      const days = selectedDays();
      if (!days.length) return `<div class="empty">표시할 일정이 없어요.</div>`;
      const stays = accommodationHtml(visibleAccommodations());
      return stays + days.map(day => {
        let routeNumber = 0;
        const cards = day.items.map(item => {
          const resolved = resolveItineraryItem(item);
          const mapped = Number.isFinite(resolved.lat) && Number.isFinite(resolved.lng);
          const number = mapped ? ++routeNumber : null;
          const secondaryIcon = item.kind === "meal" ? "🍽" : item.kind === "transfer" ? "→" : "•";
          const time = item.start ? `${escapeHtml(item.start)}${item.end ? `<br>– ${escapeHtml(item.end)}` : ""}` : "미정";
          return `
            <div class="timeline-card ${mapped ? "mapped" : ""}" data-itinerary-item="${escapeHtml(item.id)}" style="--day-color:${day.color}" ${mapped ? 'role="button" tabindex="0"' : ""}>
              <div class="timeline-time">${time}</div>
              <div class="timeline-rail"><span class="timeline-node ${mapped ? "" : "secondary"}">${mapped ? number : secondaryIcon}</span></div>
              <div class="timeline-copy">
                <strong>${escapeHtml(item.title)}</strong>
                ${item.details ? `<p>${escapeHtml(item.details)}</p>` : ""}
                ${item.transit ? `<p class="timeline-transit">이동 · ${escapeHtml(item.transit)}</p>` : ""}
              </div>
            </div>`;
        }).join("");
        const tips = day.tips?.length ? `<div class="timeline-tips">💡 ${day.tips.map(escapeHtml).join("<br>")}</div>` : "";
        return `
          <section class="timeline-day" style="--day-color:${day.color}">
            <div class="timeline-day-head"><strong>${day.dayNumber}일차 · ${escapeHtml(formatPlanDate(day.date))} · ${escapeHtml(day.title)}</strong><span>${escapeHtml(day.summary)}</span></div>
            ${cards}${tips}
          </section>`;
      }).join("");
    }

    function setActiveTimeline(itemId) {
      document.querySelectorAll("[data-itinerary-item]").forEach(card => card.classList.toggle("active", card.dataset.itineraryItem === itemId));
      const card = document.querySelector(`[data-itinerary-item="${CSS.escape(itemId)}"]`);
      if (card && window.innerWidth > 800) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function openItineraryItem(itemId) {
      const marker = routeMarkers.get(itemId);
      if (!marker) return;
      map.flyTo(marker.getLatLng(), Math.max(map.getZoom(), 15), { duration: .8 });
      window.setTimeout(() => marker.openPopup(), 500);
      setActiveTimeline(itemId);
    }

    function filteredPlaces() {
      const normalizedQuery = state.query.trim().toLocaleLowerCase("ko");
      return PLACES.filter(place => {
        const matchesPerson = place.people.some(person => state.people.has(person));
        const matchesCity = state.city === "all" || place.city === state.city;
        const matchesCategory = state.category === "all" || place.category === state.category;
        const haystack = `${place.name} ${place.aliases || ""} ${place.city} ${place.area} ${place.note}`.toLocaleLowerCase("ko");
        const matchesQuery = !normalizedQuery || haystack.includes(normalizedQuery);
        const matchesCommon = !state.commonOnly || place.people.length > 1;
        const matchesSaved = !state.savedOnly || state.saved.has(place.name);
        return matchesPerson && matchesCity && matchesCategory && matchesQuery && matchesCommon && matchesSaved;
      }).sort((a, b) => b.people.length - a.people.length || a.city.localeCompare(b.city, "ko") || a.name.localeCompare(b.name, "ko"));
    }

    function placeCard(place) {
      const category = CATEGORIES[place.category];
      const commonLabel = place.people.length === 3 ? "모두의 픽" : place.people.length === 2 ? "겹침" : "";
      return `
        <div class="place-card" role="button" tabindex="0" data-place="${escapeHtml(place.name)}" aria-label="${escapeHtml(place.name)} 지도에서 보기">
          <div class="place-icon" style="--icon-bg:${category.bg}">${category.icon}</div>
          <div class="place-main">
            <div class="place-name-row">
              <span class="place-name">${escapeHtml(place.name)}</span>
              ${commonLabel ? `<span class="common-badge">${commonLabel}</span>` : ""}
            </div>
            <div class="place-meta">${escapeHtml(place.city)} · ${escapeHtml(place.area)} · ${escapeHtml(place.category)}</div>
            <div class="tag-row">${personTags(place.people)}</div>
          </div>
          <button class="save-btn ${state.saved.has(place.name) ? "saved" : ""}" type="button" data-save="${escapeHtml(place.name)}" aria-label="${state.saved.has(place.name) ? "일정에서 빼기" : "일정에 담기"}" title="일정에 담기">${state.saved.has(place.name) ? "★" : "☆"}</button>
        </div>`;
    }

    function updateView({ fit = false } = {}) {
      const visible = filteredPlaces();
      markerLayer.clearLayers();
      const list = document.getElementById("placeList");
      document.body.classList.toggle("itinerary-mode", state.view === "itinerary");
      document.getElementById("savedCount").textContent = state.saved.size;
      document.querySelectorAll("[data-view]").forEach(button => button.classList.toggle("active", button.dataset.view === state.view));

      if (state.view === "itinerary" && selectedPlan()) {
        const days = selectedDays();
        const mappedCount = days.flatMap(day => day.items).map(resolveItineraryItem).filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng)).length;
        const stayCount = visibleAccommodations().length;
        list.innerHTML = itineraryHtml();
        document.getElementById("visibleCount").textContent = mappedCount + stayCount;
        document.getElementById("resultSummary").textContent = `${days.length}일 · 방문 ${mappedCount} · 숙소 ${stayCount}`;
        bindTimelineCards();
      } else {
        routeLayer.clearLayers();
        visible.forEach(place => markerLayer.addLayer(markers.get(place.name)));
        list.innerHTML = visible.length ? visible.map(placeCard).join("") : `<div class="empty">조건에 맞는 장소가 없어요.<br>필터를 하나 풀어보세요.</div>`;
        document.getElementById("visibleCount").textContent = visible.length;
        const commonCount = visible.filter(place => place.people.length > 1).length;
        document.getElementById("resultSummary").textContent = `${visible.length}곳 · 겹치는 픽 ${commonCount}곳`;
        bindCards();
      }

      if (fit) {
        if (state.view === "itinerary") renderRoutes({ fit: true });
        else if (visible.length) fitVisible(visible);
      }
    }

    function fitVisible(places = filteredPlaces()) {
      if (!places.length) return;
      if (places.length === 1) {
        map.flyTo([places[0].lat, places[0].lng], 16, { duration: .8 });
        return;
      }
      const bounds = L.latLngBounds(places.map(place => [place.lat, place.lng]));
      map.fitBounds(bounds, { padding: [45, 45], maxZoom: 14 });
    }

    function setActiveCard(name) {
      document.querySelectorAll(".place-card").forEach(card => card.classList.toggle("active", card.dataset.place === name));
      const card = document.querySelector(`.place-card[data-place="${CSS.escape(name)}"]`);
      if (card && window.innerWidth > 800) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function openPlace(name) {
      const place = PLACES.find(item => item.name === name);
      const marker = markers.get(name);
      if (!place || !marker) return;
      map.flyTo([place.lat, place.lng], Math.max(map.getZoom(), 15), { duration: .8 });
      window.setTimeout(() => marker.openPopup(), 500);
      setActiveCard(name);
    }

    function toggleSave(name) {
      if (state.saved.has(name)) state.saved.delete(name);
      else state.saved.add(name);
      localStorage.setItem("japan-trip-saved", JSON.stringify([...state.saved]));
      updateView();
    }

    function bindCards() {
      document.querySelectorAll(".place-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("[data-save]")) return;
          openPlace(card.dataset.place);
        });
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); openPlace(card.dataset.place); }
        });
      });
      document.querySelectorAll("[data-save]").forEach(button => {
        button.addEventListener("click", event => { event.stopPropagation(); toggleSave(button.dataset.save); });
      });
    }

    function bindTimelineCards() {
      document.querySelectorAll(".timeline-card.mapped").forEach(card => {
        card.addEventListener("click", () => openItineraryItem(card.dataset.itineraryItem));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); openItineraryItem(card.dataset.itineraryItem); }
        });
      });
      document.querySelectorAll("[data-stay-id]").forEach(card => {
        card.addEventListener("click", () => openStay(card.dataset.stayId));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); openStay(card.dataset.stayId); }
        });
      });
    }

    document.getElementById("planSelect").addEventListener("change", event => {
      state.planId = event.target.value;
      state.dayId = "all";
      state.view = "itinerary";
      renderPlanControls();
      renderRoutes({ fit: true });
      updateView();
    });
    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        state.view = button.dataset.view;
        updateView({ fit: true });
      });
    });
    document.querySelectorAll("[data-person]").forEach(button => {
      button.addEventListener("click", () => {
        const person = button.dataset.person;
        if (state.people.has(person) && state.people.size > 1) state.people.delete(person);
        else state.people.add(person);
        button.classList.toggle("active", state.people.has(person));
        updateView({ fit: true });
      });
    });
    document.getElementById("cityFilter").addEventListener("change", event => { state.city = event.target.value; updateView({ fit: true }); });
    document.getElementById("categoryFilter").addEventListener("change", event => { state.category = event.target.value; updateView({ fit: true }); });
    document.getElementById("search").addEventListener("input", event => { state.query = event.target.value; updateView(); });
    document.getElementById("commonOnly").addEventListener("click", event => { state.commonOnly = !state.commonOnly; event.currentTarget.classList.toggle("active", state.commonOnly); updateView({ fit: true }); });
    document.getElementById("savedOnly").addEventListener("click", event => { state.savedOnly = !state.savedOnly; event.currentTarget.classList.toggle("active", state.savedOnly); updateView({ fit: true }); });
    document.getElementById("fitButton").addEventListener("click", () => state.view === "itinerary" ? renderRoutes({ fit: true }) : fitVisible());
    document.getElementById("copyAllButton").addEventListener("click", copyAllPlaces);
    document.getElementById("copyPlanButton").addEventListener("click", () => {
      const open = document.getElementById("copyDropdown").hidden;
      setCopyMenuOpen(open);
    });
    document.addEventListener("click", event => {
      if (!document.getElementById("copyMenuWrap").contains(event.target)) setCopyMenuOpen(false);
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") setCopyMenuOpen(false);
    });
    document.getElementById("locateButton").addEventListener("click", () => {
      if (!navigator.geolocation) return alert("이 브라우저에서는 위치를 불러올 수 없어요.");
      navigator.geolocation.getCurrentPosition(position => {
        const latlng = [position.coords.latitude, position.coords.longitude];
        if (locationMarker) map.removeLayer(locationMarker);
        locationMarker = L.circleMarker(latlng, { radius: 8, color: "#fff", weight: 3, fillColor: "#4779d4", fillOpacity: 1 }).addTo(map).bindPopup("현재 위치").openPopup();
        map.flyTo(latlng, 15);
      }, () => alert("위치 권한을 허용하면 현재 위치를 지도에 표시할 수 있어요."), { enableHighAccuracy: true, timeout: 9000 });
    });

    renderCopyMenu();
    renderPlanControls();
    renderRoutes({ fit: true });
    updateView();
  </script>
</body>
</html>
