<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#173f35">
  <title>우리들의 일본 여행 지도</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #18312b;
      --muted: #6d7e78;
      --paper: #f8f4ec;
      --surface: #fffdf8;
      --line: #e7e0d3;
      --green: #174b3e;
      --green-soft: #e4efe9;
      --orange: #f36f45;
      --orange-soft: #fff0e8;
      --yedam: #ee7252;
      --jungwoo: #4779d4;
      --jinseo: #258d73;
      --shadow: 0 14px 40px rgba(37, 56, 49, .12);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
      overflow: hidden;
    }
    button, input, select { font: inherit; }
    button { color: inherit; }

    .app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 20px;
      color: white;
      background: var(--green);
      box-shadow: 0 4px 16px rgba(22, 48, 41, .22);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 14px;
      color: var(--green);
      background: #ffe27a;
      font-size: 21px;
      transform: rotate(-3deg);
    }
    .brand h1 { margin: 0; font-family: Georgia, "Noto Serif KR", serif; font-size: 21px; line-height: 1.1; }
    .brand p { margin: 4px 0 0; color: #c9ddd6; font-size: 12px; }
    .top-stats { display: flex; gap: 8px; }
    .top-actions { display: flex; align-items: center; gap: 9px; }
    .copy-all-button {
      display: flex;
      height: 42px;
      align-items: center;
      gap: 7px;
      padding: 0 13px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      color: white;
      background: rgba(255,255,255,.1);
      font-size: 11px;
      font-weight: 850;
      cursor: pointer;
      transition: .18s ease;
    }
    .copy-all-button:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
    .copy-all-button.copied { color: var(--green); border-color: #ffe27a; background: #ffe27a; }
    .copy-icon { font-size: 16px; line-height: 1; }
    .stat {
      min-width: 76px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      text-align: center;
    }
    .stat b { display: block; font-size: 16px; }
    .stat span { color: #c9ddd6; font-size: 10px; }

    .workspace { min-height: 0; display: grid; grid-template-columns: 410px 1fr; }
    .sidebar {
      z-index: 500;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      border-right: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 8px 0 26px rgba(35, 51, 45, .06);
    }
    .filters { padding: 17px 18px 12px; border-bottom: 1px solid var(--line); }
    .search-wrap { position: relative; }
    .search-wrap span { position: absolute; top: 11px; left: 13px; font-size: 16px; }
    #search {
      width: 100%;
      height: 42px;
      padding: 0 13px 0 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      color: var(--ink);
      background: #fff;
    }
    #search:focus { border-color: #7ea99a; box-shadow: 0 0 0 3px rgba(37,141,115,.12); }
    .filter-label { margin: 14px 0 8px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .08em; }
    .people { display: flex; flex-wrap: wrap; gap: 7px; }
    .person-chip, .mini-filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      cursor: pointer;
      transition: .18s ease;
    }
    .person-chip { display: flex; align-items: center; gap: 7px; padding: 7px 10px; font-size: 12px; font-weight: 750; }
    .person-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--person); }
    .person-chip.active { color: white; border-color: var(--person); background: var(--person); }
    .person-chip.active .dot { background: white; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 11px; }
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%;
      height: 38px;
      padding: 0 28px 0 11px;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      color: var(--ink);
      background: white;
      font-size: 12px;
      font-weight: 700;
    }
    .select-wrap::after { content: "⌄"; position: absolute; top: 7px; right: 11px; pointer-events: none; color: var(--muted); }
    .toggle-row { display: flex; gap: 7px; margin-top: 9px; }
    .mini-filter { flex: 1; padding: 8px 6px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .mini-filter.active { color: var(--green); border-color: #92b8a8; background: var(--green-soft); }

    .list-heading { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 8px; }
    .list-heading h2 { margin: 0; font-size: 14px; }
    .list-heading span { color: var(--muted); font-size: 11px; }
    .place-list { min-height: 0; overflow: auto; padding: 0 11px 22px; scrollbar-width: thin; scrollbar-color: #c9d3ce transparent; }
    .place-card {
      width: 100%;
      display: grid;
      grid-template-columns: 39px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 11px 9px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: .16s ease;
    }
    .place-card:hover, .place-card.active { border-color: var(--line); background: #fff; box-shadow: 0 7px 20px rgba(37, 56, 49, .07); transform: translateY(-1px); }
    .place-icon {
      display: grid;
      width: 39px;
      height: 39px;
      place-items: center;
      border-radius: 12px;
      background: var(--icon-bg, #edf3ef);
      font-size: 17px;
    }
    .place-main { min-width: 0; }
    .place-name-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .place-name { overflow: hidden; font-size: 13px; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
    .common-badge { flex: 0 0 auto; padding: 2px 5px; border-radius: 5px; color: #b34a2e; background: var(--orange-soft); font-size: 8px; font-weight: 900; }
    .place-meta { margin-top: 4px; overflow: hidden; color: var(--muted); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .person-tag { padding: 3px 6px; border-radius: 999px; color: white; background: var(--person); font-size: 9px; font-weight: 800; }
    .save-btn {
      display: grid;
      width: 29px;
      height: 29px;
      place-items: center;
      border: 0;
      border-radius: 9px;
      color: #9ba7a2;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
    }
    .save-btn:hover { background: #f2eee6; }
    .save-btn.saved { color: var(--orange); }
    .empty { padding: 40px 24px; color: var(--muted); text-align: center; font-size: 13px; line-height: 1.7; }

    .map-wrap { position: relative; min-width: 0; min-height: 0; background: #dfe9e3; }
    #map { position: absolute; inset: 0; }
    .map-tools { position: absolute; z-index: 450; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 8px; }
    .map-tool {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(24,49,43,.12);
      border-radius: 12px;
      background: rgba(255,253,248,.96);
      box-shadow: 0 6px 20px rgba(27,50,43,.16);
      font-size: 17px;
      cursor: pointer;
    }
    .map-tool:hover { background: white; transform: translateY(-1px); }
    .legend {
      position: absolute;
      z-index: 450;
      right: 14px;
      bottom: 22px;
      padding: 10px 12px;
      border: 1px solid rgba(24,49,43,.1);
      border-radius: 12px;
      background: rgba(255,253,248,.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      font-size: 10px;
    }
    .legend strong { display: block; margin-bottom: 7px; font-size: 10px; }
    .legend-row { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .legend-row + .legend-row { margin-top: 5px; }
    .legend-mark { width: 11px; height: 11px; border: 2px solid white; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 1px #b8c7c0; }
    .legend-mark.common { background: var(--orange); box-shadow: 0 0 0 3px rgba(243,111,69,.2); }

    .custom-pin { background: transparent; border: 0; }
    .pin-body {
      position: relative;
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50% 50% 50% 9px;
      color: white;
      background: var(--pin, var(--green));
      box-shadow: 0 6px 13px rgba(24,49,43,.27);
      font-size: 15px;
      transform: rotate(-45deg);
    }
    .pin-body span { transform: rotate(45deg); }
    .pin-body.common::after {
      content: "";
      position: absolute;
      inset: -6px;
      border: 2px solid var(--orange);
      border-radius: 50% 50% 50% 10px;
    }
    .leaflet-popup-content-wrapper { border-radius: 15px; box-shadow: var(--shadow); }
    .leaflet-popup-content { width: 248px !important; margin: 15px 16px 14px; font-family: inherit; }
    .popup-kicker { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 10px; font-weight: 800; }
    .popup-title { margin: 6px 0 5px; color: var(--ink); font-size: 16px; font-weight: 900; line-height: 1.35; }
    .popup-desc { margin: 0 0 10px; color: #5f706a; font-size: 11px; line-height: 1.55; }
    .popup-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
    .popup-tags .person-tag { font-size: 10px; }
    .popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .popup-actions a {
      padding: 8px 6px;
      border-radius: 9px;
      color: white;
      background: var(--green);
      text-align: center;
      text-decoration: none;
      font-size: 10px;
      font-weight: 850;
    }
    .popup-actions a:last-child { color: var(--green); background: var(--green-soft); }
    .leaflet-control-attribution { font-size: 8px; }

    @media (max-width: 800px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; }
      .topbar { position: sticky; top: 0; padding: 11px 13px; }
      .brand-mark { width: 37px; height: 37px; border-radius: 12px; }
      .brand h1 { font-size: 17px; }
      .brand p { display: none; }
      .stat { min-width: 58px; padding: 6px 7px; }
      .stat:nth-child(2) { display: none; }
      .top-actions { gap: 6px; }
      .copy-all-button { width: 55px; padding: 0; justify-content: center; }
      .copy-label { display: none; }
      .copy-all-button::after { content: "복사"; font-size: 10px; }
      .copy-all-button.copied::after { content: "완료"; }
      .copy-icon { font-size: 14px; }
      .workspace { display: flex; flex-direction: column; }
      .map-wrap { order: 1; height: 53vh; min-height: 390px; }
      .sidebar { order: 2; min-height: 640px; border: 0; box-shadow: none; }
      .legend { bottom: 12px; }
      .place-list { max-height: 620px; overflow: visible; }
      .filters { padding-top: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">旅</div>
        <div>
          <h1>우리들의 일본 여행 지도</h1>
          <p>예담 · 정우 · 진서의 가고 싶은 곳을 한 장에</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="copy-all-button" id="copyAllButton" type="button" title="43곳의 모든 정보를 복사">
          <span class="copy-icon" aria-hidden="true">⧉</span><span class="copy-label">전체 정보 복사</span>
        </button>
        <div class="top-stats" aria-label="여행지 요약">
          <div class="stat"><b id="visibleCount">43</b><span>보이는 장소</span></div>
          <div class="stat"><b id="savedCount">0</b><span>일정에 담음</span></div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="filters" aria-label="여행지 필터">
          <div class="search-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="search" type="search" placeholder="장소 이름이나 메모 검색" autocomplete="off">
          </div>

          <div class="filter-label">누구의 픽?</div>
          <div class="people" id="peopleFilters">
            <button class="person-chip active" type="button" data-person="예담" style="--person: var(--yedam)"><span class="dot"></span>예담 <span>24</span></button>
            <button class="person-chip active" type="button" data-person="정우" style="--person: var(--jungwoo)"><span class="dot"></span>정우 <span>16</span></button>
            <button class="person-chip active" type="button" data-person="진서" style="--person: var(--jinseo)"><span class="dot"></span>진서 <span>10</span></button>
          </div>

          <div class="filter-row">
            <label class="select-wrap">
              <select id="cityFilter" aria-label="도시 선택">
                <option value="all">모든 도시</option>
                <option value="후쿠오카">후쿠오카</option>
                <option value="구마모토">구마모토</option>
                <option value="나가사키">나가사키</option>
              </select>
            </label>
            <label class="select-wrap">
              <select id="categoryFilter" aria-label="장소 종류 선택">
                <option value="all">모든 종류</option>
                <option value="볼거리">⛩ 볼거리</option>
                <option value="산책">🌿 산책</option>
                <option value="쇼핑">🛍 쇼핑</option>
                <option value="맛집">🍜 맛집</option>
                <option value="카페">☕ 카페·빵</option>
                <option value="체험">♨ 체험·온천</option>
              </select>
            </label>
          </div>
          <div class="toggle-row">
            <button class="mini-filter" id="commonOnly" type="button">🔥 겹치는 픽만</button>
            <button class="mini-filter" id="savedOnly" type="button">★ 일정에 담은 곳</button>
          </div>
        </section>

        <div class="list-heading">
          <h2>여행지 목록</h2>
          <span id="resultSummary">43곳 · 겹치는 픽 우선</span>
        </div>
        <div class="place-list" id="placeList"></div>
      </aside>

      <section class="map-wrap" aria-label="여행 지도">
        <div id="map"></div>
        <div class="map-tools">
          <button class="map-tool" id="fitButton" type="button" title="보이는 핀 전체 보기" aria-label="보이는 핀 전체 보기">⌗</button>
          <button class="map-tool" id="locateButton" type="button" title="내 위치" aria-label="내 위치">◎</button>
        </div>
        <div class="legend">
          <strong>핀 안내</strong>
          <div class="legend-row"><span class="legend-mark common"></span>2명 이상 겹치는 픽</div>
          <div class="legend-row"><span class="legend-mark"></span>한 사람의 픽</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const PEOPLE = {
      "예담": { color: "#ee7252" },
      "정우": { color: "#4779d4" },
      "진서": { color: "#258d73" }
    };

    const CATEGORIES = {
      "볼거리": { icon: "⛩", color: "#a95e42", bg: "#f8e9e2" },
      "산책": { icon: "🌿", color: "#347c60", bg: "#e7f2eb" },
      "쇼핑": { icon: "🛍", color: "#6b67b5", bg: "#eeebfa" },
      "맛집": { icon: "🍜", color: "#d66a3f", bg: "#fff0e7" },
      "카페": { icon: "☕", color: "#9a7042", bg: "#f7ede0" },
      "체험": { icon: "♨", color: "#3f7da0", bg: "#e5f1f7" }
    };

    const PLACES = [
      { name:"도초지", city:"후쿠오카", area:"기온·카와바타", category:"볼거리", people:["예담"], lat:33.5952317, lng:130.4138692, note:"거대 목조 불상이 있는 유서 깊은 사찰" },
      { name:"쇼후쿠지", city:"후쿠오카", area:"기온·카와바타", category:"볼거리", people:["예담"], lat:33.5970079, lng:130.4142019, note:"일본에서 가장 오래된 고즈넉한 선종 사찰" },
      { name:"하카타 향토관", city:"후쿠오카", area:"기온·카와바타", category:"체험", people:["예담"], lat:33.59335, lng:130.41134, note:"하카타의 전통 공예와 축제 문화를 보는 곳" },
      { name:"구시다 신사", city:"후쿠오카", area:"기온·카와바타", category:"볼거리", people:["예담"], lat:33.59307, lng:130.4106837, note:"축제용 거대 가마가 상시 전시된 수호 신사" },
      { name:"카와바타 상점가", city:"후쿠오카", area:"기온·카와바타", category:"쇼핑", people:["예담"], lat:33.5941, lng:130.40845, note:"전통 상점과 맛집이 모인 아케이드 거리" },
      { name:"하카타 리버레인", city:"후쿠오카", area:"기온·카와바타", category:"쇼핑", people:["예담"], lat:33.5950381, lng:130.4057596, note:"호빵맨 박물관과 아시아 미술관이 있는 쇼핑몰" },
      { name:"스미요시 신사", city:"후쿠오카", area:"하카타역 남측", category:"볼거리", people:["예담"], lat:33.5857544, lng:130.4134348, note:"도심 속 울창한 숲에 둘러싸인 고요한 신사" },
      { name:"라쿠스이엔", city:"후쿠오카", area:"하카타역 남측", category:"체험", people:["예담"], lat:33.5865548, lng:130.4132676, note:"전통 정원을 바라보며 말차 체험을 하는 곳" },
      { name:"캐널시티 하카타", city:"후쿠오카", area:"하카타·나카스", category:"쇼핑", people:["예담","정우"], lat:33.5896715, lng:130.411141, note:"운하와 분수 쇼가 있는 대형 쇼핑몰 · 정우 9순위" },
      { name:"나카강변 & 나카스 야타이", aliases:"나카스 강변", city:"후쿠오카", area:"나카스", category:"맛집", people:["예담","정우"], lat:33.5913939, lng:130.4070634, note:"강변 야경과 포장마차를 함께 즐기는 야간 명소 · 정우 8순위" },

    const state = {
      people: new Set(Object.keys(PEOPLE)),
      city: "all",
      category: "all",
      query: "",
      commonOnly: false,
      savedOnly: false,
      saved: new Set(JSON.parse(localStorage.getItem("japan-trip-saved") || "[]"))
    };

    const map = L.map("map", { zoomControl: false, minZoom: 5 }).setView([33.5902, 130.4017], 13);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 20,
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const markers = new Map();
    let locationMarker = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;" })[char]);
    }

    function personTags(people) {
      return people.map(person => `<span class="person-tag" style="--person:${PEOPLE[person].color}">${person}</span>`).join("");
    }

    function searchUrl(place) {
      if (place.mapUrl) return place.mapUrl;
      const query = encodeURIComponent(`${place.name} ${place.city} 일본`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function routeUrl(place) {
      return `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}`;
    }

    function allPlacesText() {
      const lines = ["우리들의 일본 여행 지도", `총 ${PLACES.length}곳`, ""];
      [...new Set(PLACES.map(place => place.city))].forEach(city => {
        lines.push(`■ ${city}`);
        PLACES.filter(place => place.city === city).forEach((place, index) => {
          lines.push(`${index + 1}. ${place.name}`);
          lines.push(`   지역: ${place.area}`);
          lines.push(`   종류: ${place.category}`);
          lines.push(`   태그: ${place.people.join(", ")}`);
          lines.push(`   메모: ${place.note}`);
          lines.push(`   지도: ${searchUrl(place)}`);
          lines.push("");
        });
      });
      return lines.join("\n").trim();
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      const copied = document.execCommand("copy");
      textarea.remove();
      if (!copied) throw new Error("copy failed");
    }

    async function copyAllPlaces() {
      const button = document.getElementById("copyAllButton");
      const label = button.querySelector(".copy-label");
      try {
        const text = allPlacesText();
        if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
        else fallbackCopy(text);
        button.classList.add("copied");
        label.textContent = "43곳 복사 완료";
        window.setTimeout(() => {
          button.classList.remove("copied");
          label.textContent = "전체 정보 복사";
        }, 1800);
      } catch (error) {
        alert("복사하지 못했습니다. 브라우저의 클립보드 권한을 확인해주세요.");
      }
    }

    function popupHtml(place) {
      const category = CATEGORIES[place.category];
      const common = place.people.length > 1 ? ` · ${place.people.length === 3 ? "모두의 픽" : "겹치는 픽"}` : "";
      return `
        <div class="popup-kicker">${category.icon} ${escapeHtml(place.category)} · ${escapeHtml(place.area)}${common}</div>
        <div class="popup-title">${escapeHtml(place.name)}</div>
        <p class="popup-desc">${escapeHtml(place.note)}</p>
        <div class="popup-tags">${personTags(place.people)}</div>
        <div class="popup-actions">
          <a href="${searchUrl(place)}" target="_blank" rel="noopener">Google 지도</a>
          <a href="${routeUrl(place)}" target="_blank" rel="noopener">길찾기 ↗</a>
        </div>`;
    }

    function markerIcon(place) {
      const category = CATEGORIES[place.category];
      return L.divIcon({
        className: "custom-pin",
        html: `<div class="pin-body ${place.people.length > 1 ? "common" : ""}" style="--pin:${category.color}"><span>${category.icon}</span></div>`,
        iconSize: [38, 42],
        iconAnchor: [19, 39],
        popupAnchor: [0, -35]
      });
    }

    PLACES.forEach(place => {
      const marker = L.marker([place.lat, place.lng], { icon: markerIcon(place), title: place.name }).bindPopup(popupHtml(place));
      marker.on("click", () => setActiveCard(place.name));
      markers.set(place.name, marker);
    });

    function filteredPlaces() {
      const normalizedQuery = state.query.trim().toLocaleLowerCase("ko");
      return PLACES.filter(place => {
        const matchesPerson = place.people.some(person => state.people.has(person));
        const matchesCity = state.city === "all" || place.city === state.city;
        const matchesCategory = state.category === "all" || place.category === state.category;
        const haystack = `${place.name} ${place.aliases || ""} ${place.city} ${place.area} ${place.note}`.toLocaleLowerCase("ko");
        const matchesQuery = !normalizedQuery || haystack.includes(normalizedQuery);
        const matchesCommon = !state.commonOnly || place.people.length > 1;
        const matchesSaved = !state.savedOnly || state.saved.has(place.name);
        return matchesPerson && matchesCity && matchesCategory && matchesQuery && matchesCommon && matchesSaved;
      }).sort((a, b) => b.people.length - a.people.length || a.city.localeCompare(b.city, "ko") || a.name.localeCompare(b.name, "ko"));
    }

    function placeCard(place) {
      const category = CATEGORIES[place.category];
      const commonLabel = place.people.length === 3 ? "모두의 픽" : place.people.length === 2 ? "겹침" : "";
      return `
        <div class="place-card" role="button" tabindex="0" data-place="${escapeHtml(place.name)}" aria-label="${escapeHtml(place.name)} 지도에서 보기">
          <div class="place-icon" style="--icon-bg:${category.bg}">${category.icon}</div>
          <div class="place-main">
            <div class="place-name-row">
              <span class="place-name">${escapeHtml(place.name)}</span>
              ${commonLabel ? `<span class="common-badge">${commonLabel}</span>` : ""}
            </div>
            <div class="place-meta">${escapeHtml(place.city)} · ${escapeHtml(place.area)} · ${escapeHtml(place.category)}</div>
            <div class="tag-row">${personTags(place.people)}</div>
          </div>
          <button class="save-btn ${state.saved.has(place.name) ? "saved" : ""}" type="button" data-save="${escapeHtml(place.name)}" aria-label="${state.saved.has(place.name) ? "일정에서 빼기" : "일정에 담기"}" title="일정에 담기">${state.saved.has(place.name) ? "★" : "☆"}</button>
        </div>`;
    }

    function updateView({ fit = false } = {}) {
      const visible = filteredPlaces();
      markerLayer.clearLayers();
      visible.forEach(place => markerLayer.addLayer(markers.get(place.name)));

      const list = document.getElementById("placeList");
      list.innerHTML = visible.length ? visible.map(placeCard).join("") : `<div class="empty">조건에 맞는 장소가 없어요.<br>필터를 하나 풀어보세요.</div>`;
      document.getElementById("visibleCount").textContent = visible.length;
      document.getElementById("savedCount").textContent = state.saved.size;
      const commonCount = visible.filter(place => place.people.length > 1).length;
      document.getElementById("resultSummary").textContent = `${visible.length}곳 · 겹치는 픽 ${commonCount}곳`;
      bindCards();

      if (fit && visible.length) fitVisible(visible);
    }

    function fitVisible(places = filteredPlaces()) {
      if (!places.length) return;
      if (places.length === 1) {
        map.flyTo([places[0].lat, places[0].lng], 16, { duration: .8 });
        return;
      }
      const bounds = L.latLngBounds(places.map(place => [place.lat, place.lng]));
      map.fitBounds(bounds, { padding: [45, 45], maxZoom: 14 });
    }

    function setActiveCard(name) {
      document.querySelectorAll(".place-card").forEach(card => card.classList.toggle("active", card.dataset.place === name));
      const card = document.querySelector(`.place-card[data-place="${CSS.escape(name)}"]`);
      if (card && window.innerWidth > 800) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function openPlace(name) {
      const place = PLACES.find(item => item.name === name);
      const marker = markers.get(name);
      if (!place || !marker) return;
      map.flyTo([place.lat, place.lng], Math.max(map.getZoom(), 15), { duration: .8 });
      window.setTimeout(() => marker.openPopup(), 500);
      setActiveCard(name);
    }

    function toggleSave(name) {
      if (state.saved.has(name)) state.saved.delete(name);
      else state.saved.add(name);
      localStorage.setItem("japan-trip-saved", JSON.stringify([...state.saved]));
      updateView();
    }

    function bindCards() {
      document.querySelectorAll(".place-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("[data-save]")) return;
          openPlace(card.dataset.place);
        });
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); openPlace(card.dataset.place); }
        });
      });
      document.querySelectorAll("[data-save]").forEach(button => {
        button.addEventListener("click", event => { event.stopPropagation(); toggleSave(button.dataset.save); });
      });
    }

    document.querySelectorAll("[data-person]").forEach(button => {
      button.addEventListener("click", () => {
        const person = button.dataset.person;
        if (state.people.has(person) && state.people.size > 1) state.people.delete(person);
        else state.people.add(person);
        button.classList.toggle("active", state.people.has(person));
        updateView({ fit: true });
      });
    });
    document.getElementById("cityFilter").addEventListener("change", event => { state.city = event.target.value; updateView({ fit: true }); });
    document.getElementById("categoryFilter").addEventListener("change", event => { state.category = event.target.value; updateView({ fit: true }); });
    document.getElementById("search").addEventListener("input", event => { state.query = event.target.value; updateView(); });
    document.getElementById("commonOnly").addEventListener("click", event => { state.commonOnly = !state.commonOnly; event.currentTarget.classList.toggle("active", state.commonOnly); updateView({ fit: true }); });
    document.getElementById("savedOnly").addEventListener("click", event => { state.savedOnly = !state.savedOnly; event.currentTarget.classList.toggle("active", state.savedOnly); updateView({ fit: true }); });
    document.getElementById("fitButton").addEventListener("click", () => fitVisible());
    document.getElementById("copyAllButton").addEventListener("click", copyAllPlaces);
    document.getElementById("locateButton").addEventListener("click", () => {
      if (!navigator.geolocation) return alert("이 브라우저에서는 위치를 불러올 수 없어요.");
      navigator.geolocation.getCurrentPosition(position => {
        const latlng = [position.coords.latitude, position.coords.longitude];
        if (locationMarker) map.removeLayer(locationMarker);
        locationMarker = L.circleMarker(latlng, { radius: 8, color: "#fff", weight: 3, fillColor: "#4779d4", fillOpacity: 1 }).addTo(map).bindPopup("현재 위치").openPopup();
        map.flyTo(latlng, 15);
      }, () => alert("위치 권한을 허용하면 현재 위치를 지도에 표시할 수 있어요."), { enableHighAccuracy: true, timeout: 9000 });
    });

    updateView();
  </script>
</body>
</html>
