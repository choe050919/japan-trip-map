name: Sync places from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync-places:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate places.js
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: node scripts/sync-places-from-sheet.js

      - name: Validate generated JavaScript
        run: node --check data/places.js

      - name: Commit updated places
        run: |
          if git diff --quiet -- data/places.js; then
            echo "No places changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/places.js
          git commit -m "Update places from Google Sheets"
          git push
